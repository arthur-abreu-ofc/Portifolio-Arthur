<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Catálogo de Jogos</title>
    <style>
        body {
            text-align: center;
            background-color: #000; 
            color: #fff; 
            font-family: Arial, sans-serif;
            align-items: center;
        }

        table {
            width: 80%;
            border-collapse: collapse;
            background-color: #000;
            margin-top: 20px;
        }

        th, td {
            border: 2px solid #fff; 
            padding: 10px;
            text-align: center;
        }

        th {
            background-color: #ff0000; 
            color: #fff; 
        }

        td {
            background-color: #000; 
            color: #fff; 
        }

        a {
            color: #ff0000; 
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <h1>Catálogo de Jogos:</h1>

    <table>
        <tr>
            <th>Imagem</th>
            <th>Nome</th>
            <th>Preço</th>
            <th>Link</th>
        </tr>

        <tr>
            <td>
                <img src="https://upload.wikimedia.org/wikipedia/en/a/a5/Grand_Theft_Auto_V.png" width="100" alt="GTA V">
            </td>
            <td>GTA V</td>
            <td>R$ 79,90</td>
            <td>
                <a href="https://www.rockstargames.com/br/gta-v" target="_blank">Ver produto</a>
            </td>
        </tr>

        <tr>
            <td>
                <img src="https://gamefaqs.gamespot.com/a/box/1/5/3/1065153_front.jpg" width="100" alt="Minecraft">
            </td>
            <td>Minecraft</td>
            <td>R$ 99,90</td>
            <td>
                <a href="https://www.minecraft.net/pt-br" target="_blank">Ver produto</a>
            </td>
        </tr>

        <tr>
            <td>
                <img src="https://upload.wikimedia.org/wikipedia/en/b/b9/Elden_Ring_Box_art.jpg" width="100" alt="Elden Ring">
            </td>
            <td>Elden Ring</td>
            <td>R$ 249,90</td>
            <td>
                <a href="https://www.google.com/search?q=Elden+Ring" target="_blank">Ver produto</a>
            </td>
        </tr>

    </table>

</body>
</html>
